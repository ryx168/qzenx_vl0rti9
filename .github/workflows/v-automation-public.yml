name: X-Post-Automation

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — generate posts but do NOT submit'
        required: false
        default: false
        type: boolean
      upload_ollama_model:
        description: 'Pull Ollama model and upload to Google Drive (one-time setup)'
        required: false
        default: false
        type: boolean

jobs:
  run-x-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      TZ: 'America/Los_Angeles'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # --- LLM Source 1: Antigravity Manager (primary) ---
      API_KEY: ${{ secrets.ANTIGRAVITY_API_KEY }}
      API_BASE_URL: http://127.0.0.1:8045/v1
      # --- LLM Source 2: GitHub Models (cloud fallback) ---
      GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
      GH_MODELS_BASE_URL: https://models.inference.ai.azure.com
      GH_MODEL: gpt-4o
      # --- LLM Source 3: Ollama (local last resort) ---
      OLLAMA_BASE_URL: http://127.0.0.1:11434/v1
      OLLAMA_MODEL: llama3.2:3b

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt
          .venv/bin/python -m pip install google-api-python-client google-auth-oauthlib selenium openai

      # -------------------------------------------------------
      # CACHE RESTORES
      # -------------------------------------------------------

      - name: Restore Antigravity Data Session
        uses: actions/cache/restore@v4
        with:
          path: ~/.antigravity_tools
          key: antigravity-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            antigravity-data-${{ runner.os }}-

      - name: Create session directories
        run: mkdir -p ~/.browser-session

      - name: Restore browser session
        uses: actions/cache/restore@v4
        with:
          path: ~/.browser-session
          key: v-browser-session-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            v-browser-session-${{ runner.os }}-

      - name: Clear stale browser locks
        run: |
          rm -f ~/.browser-session/SingletonLock
          rm -f ~/.browser-session/SingletonCookie
          find ~/.browser-session -name "lockfile" -delete || true

      # -------------------------------------------------------
      # SYSTEM DEPENDENCIES
      # -------------------------------------------------------

      - name: Write X session
        run: echo '${{ secrets.X_SESSION_JSON }}' > /tmp/x_session.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgbm1 ffmpeg
          sudo apt-get install -y python3-tk python3-dev scrot xclip xsel
          sudo apt-get install -y tesseract-ocr libtesseract-dev
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          # Remove stale chromedriver so selenium-manager automatically downloads the compatible version
          sudo find /usr /opt -name "chromedriver" -type f -delete || true

      # -------------------------------------------------------
      # LLM SOURCE 1: ANTIGRAVITY MANAGER (PRIMARY)
      # -------------------------------------------------------

      - name: Cache Antigravity Docker Image
        uses: actions/cache@v4
        id: cache-antigravity
        with:
          path: /tmp/antigravity-image.tar
          key: antigravity-docker-v1

      - name: Download & Save Docker Image
        if: steps.cache-antigravity.outputs.cache-hit != 'true'
        run: |
          docker pull lbjlaq/antigravity-manager:latest
          docker save lbjlaq/antigravity-manager:latest -o /tmp/antigravity-image.tar

      - name: Load Cached Docker Image
        if: steps.cache-antigravity.outputs.cache-hit == 'true'
        run: docker load -i /tmp/antigravity-image.tar

      - name: Start Antigravity Manager via Docker
        run: |
          docker run -d --name antigravity-manager \
            --restart always \
            -p 8045:8045 \
            -e API_KEY="${{ secrets.ANTIGRAVITY_API_KEY }}" \
            -e NO_CACHE=true \
            -v ~/.antigravity_tools:/root/.antigravity_tools \
            -v ~/.browser-session:/root/.browser-session \
            lbjlaq/antigravity-manager:latest

      - name: Wait for Antigravity Manager to initialize
        run: |
          sleep 10
          curl -f http://127.0.0.1:8045/v1/models || echo "API still starting, proceeding..."
          sleep 10

      # -------------------------------------------------------
      # LLM SOURCE 2: GITHUB MODELS (CLOUD FALLBACK)
      # -------------------------------------------------------

      - name: Verify GitHub Models API
        run: |
          echo "Testing GitHub Models connectivity..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GH_MODELS_TOKEN }}" \
            https://models.inference.ai.azure.com/models)
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ GitHub Models API: OK"
            echo "GH_MODELS_AVAILABLE=true" >> $GITHUB_ENV
          else
            echo "⚠️ GitHub Models API: HTTP $RESPONSE"
            echo "GH_MODELS_AVAILABLE=false" >> $GITHUB_ENV
          fi

      # -------------------------------------------------------
      # LLM SOURCE 3: OLLAMA (LOCAL LAST RESORT)
      # -------------------------------------------------------

      - name: Free up disk space for Ollama
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          docker image prune -f || true
          df -h

      - name: Install and Start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          mkdir -p logs
          OLLAMA_HOST=0.0.0.0 ollama serve > logs/ollama_server.log 2>&1 &
          sleep 5
          echo "✅ Ollama server started"

      - name: Cache Ollama model
        uses: actions/cache@v4
        id: cache-ollama-model
        with:
          path: ~/.ollama/models
          key: ollama-llama3.2-3b-v1

      - name: Create Google Credentials
        run: |
          if [ -n "${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}" ]; then
            echo "${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}" > credentials.json
          fi
          if [ -n "${{ secrets.GOOGLE_DRIVE_TOKEN }}" ]; then
            echo "${{ secrets.GOOGLE_DRIVE_TOKEN }}" > token.json
            mkdir -p ~/.api_tools
            echo "${{ secrets.GOOGLE_DRIVE_TOKEN }}" > ~/.api_tools/token.json
          fi

      - name: Restore Ollama model from Google Drive (if cache miss)
        if: steps.cache-ollama-model.outputs.cache-hit != 'true'
        run: |
          if [ -f "ollama_model_drive_id.txt" ]; then
            echo "Cache miss — restoring Ollama model from Google Drive..."
            .venv/bin/python - <<'EOF'
          from googleapiclient.discovery import build
          from google.oauth2.credentials import Credentials
          from googleapiclient.http import MediaIoBaseDownload
          import os

          token_file = 'token.json'
          if not os.path.exists(token_file):
              print("No token.json — skipping Drive restore")
              exit(0)

          model_id = open('ollama_model_drive_id.txt').read().strip()
          creds = Credentials.from_authorized_user_file(token_file)
          service = build('drive', 'v3', credentials=creds)

          print(f"Downloading model archive from Drive (id={model_id})...")
          request = service.files().get_media(fileId=model_id)
          with open('/tmp/ollama-llama3.2-3b.tar.gz', 'wb') as f:
              downloader = MediaIoBaseDownload(f, request)
              done = False
              while not done:
                  status, done = downloader.next_chunk()
                  print(f"  {int(status.progress() * 100)}%")
          print("Download complete.")
          EOF
            mkdir -p ~/.ollama/models
            tar -xzf /tmp/ollama-llama3.2-3b.tar.gz -C ~/.ollama/models
            echo "✅ Ollama model restored from Google Drive"
          else
            echo "No Drive model ID found — will pull from Ollama registry"
          fi

      - name: Pull Ollama model (if not cached or restored)
        if: steps.cache-ollama-model.outputs.cache-hit != 'true'
        run: |
          if [ ! -d ~/.ollama/models/manifests ]; then
            echo "Pulling llama3.2:3b from Ollama registry..."
            ollama pull llama3.2:3b
            echo "✅ Model pulled"
          else
            echo "✅ Model already present (restored from Drive)"
          fi

      - name: Upload Ollama model to Google Drive (one-time setup)
        if: ${{ github.event.inputs.upload_ollama_model == 'true' }}
        run: |
          echo "=== Searching for Ollama model files ==="
          find / -name "*.gguf" 2>/dev/null || true
          find / -path "*ollama*" -name "manifest*" 2>/dev/null || true

          echo "=== Checking common paths ==="
          ls -la $HOME/.ollama/ 2>/dev/null || echo "~/.ollama not found"
          ls -la /usr/share/ollama/ 2>/dev/null || echo "/usr/share/ollama not found"
          ls -la /root/.ollama/ 2>/dev/null || echo "/root/.ollama not found"

          echo "=== Ollama info ==="
          ollama list
          which ollama
          ollama --version

      - name: Verify Ollama model ready
        run: |
          ollama list
          echo "OLLAMA_AVAILABLE=true" >> $GITHUB_ENV

      # -------------------------------------------------------
      # DISPLAY + CREDENTIALS
      # -------------------------------------------------------

      - name: Setup Virtual Display
        run: |
          set +e
          touch ~/.Xauthority
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "XAUTHORITY=$HOME/.Xauthority" >> $GITHUB_ENV
          sleep 5

      # -------------------------------------------------------
      # NORMAL RUN
      # -------------------------------------------------------

      - name: Run X-Post
        env:
          V_URL: https://x.com/home
        run: |
          mkdir -p logs

          google-chrome \
            --no-sandbox \
            --disable-dev-shm-usage \
            --disable-gpu \
            --remote-debugging-port=9222 \
            --disable-session-crashed-bubble \
            --no-first-run \
            --no-default-browser-check \
            --disable-infobars \
            --window-size=1320,1080 \
            --window-position=0,0 \
            --user-data-dir="$HOME/.browser-session" \
            "${V_URL}" > logs/chrome_startup.log 2>&1 &
          sleep 12

          DRY_RUN_ARG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_ARG="--dry-run"
          fi

          .venv/bin/python scripts/post_to_x.py $DRY_RUN_ARG

      # -------------------------------------------------------
      # SAVE STATE
      # -------------------------------------------------------

      - name: Commit and Push State Changes
        if: always()
        run: |
          touch posted-ids.json
          git add posted-ids.json || true
          git commit -m "Update posted IDs [skip ci]" || echo "No changes to commit"
          git push origin HEAD || true

      - name: Save Antigravity Data Session
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.antigravity_tools
          key: antigravity-data-${{ runner.os }}-${{ github.run_id }}

      - name: Stop Chrome before saving session
        if: always()
        run: |
          pkill -f google-chrome || true
          sleep 3
          rm -f ~/.browser-session/SingletonLock
          rm -f ~/.browser-session/SingletonCookie
          find ~/.browser-session -name "lockfile" -delete || true
          mkdir -p ~/.browser-session

      - name: Save browser session
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.browser-session
            !~/.browser-session/Default/Cache
            !~/.browser-session/Default/Code Cache
            !~/.browser-session/Default/GPUCache
          key: v-browser-session-${{ runner.os }}-${{ github.run_id }}

      - name: Ensure Ollama model directory exists
        if: always()
        run: mkdir -p ~/.ollama/models

      - name: Save Ollama model cache
        if: always() && steps.cache-ollama-model.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.ollama/models
          key: ollama-llama3.2-3b-v1