name: V-Automation

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Specific project folder or date'
        required: false
        type: string

jobs:
  run-v-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb python3-tk python3-dev scrot gnome-screenshot x11vnc novnc websockify xclip xsel
          sudo apt-get install -y tesseract-ocr libtesseract-dev openssh-server libgbm1 ffmpeg
          xclip -version || true
          xsel --version || true
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          
      - name: Cache Python virtual environment
        uses: actions/cache@v3
        id: cache-venv
        with:
          path: .venv
          key: ${{ runner.os }}-venv-v-process
          
      - name: Install Python dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "$(pwd)/.venv/bin" >> $GITHUB_PATH
          echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Activate Virtual Environment
        run: |
          echo "$(pwd)/.venv/bin" >> $GITHUB_PATH
          
      - name: Create session directories
        run: |
          mkdir -p .browser-session
          
      - name: Restore browser session
        uses: actions/cache/restore@v3
        with:
          path: .browser-session
          key: v-browser-session-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            v-browser-session-${{ runner.os }}-

      - name: Clear stale browser locks
        run: |
          rm -f .browser-session/SingletonLock
          rm -f .browser-session/SingletonCookie
          find .browser-session -name "lockfile" -delete || true
            
      - name: Create Google Credentials
        run: |
          if [ -n "${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}" ]; then
            echo "${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}" > credentials.json
          fi
          if [ -n "${{ secrets.GOOGLE_DRIVE_TOKEN }}" ]; then
            echo "${{ secrets.GOOGLE_DRIVE_TOKEN }}" | base64 --decode > token.pickle
          fi

      - name: Setup Virtual Display
        run: |
          set +e
          touch ~/.Xauthority
          Xvfb :99 -screen 0 2650x1550x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "XAUTHORITY=$HOME/.Xauthority" >> $GITHUB_ENV
          sleep 5
          xdpyinfo -display :99 > /dev/null 2>&1 || echo "⚠️ Xvfb reported issues"

      - name: Run V-Process (Persistent Auto-Run Mode)
        env:
          V_URL: ${{ secrets.V_URL }}
        run: |
          set +e
          source .venv/bin/activate
          export DISPLAY=:99
          mkdir -p logs
          
          # Start Control Panel in background so it's available via VNC if needed
          .venv/bin/python v_lib/v_process/controls.py > /dev/null 2>&1 &
          
          google-chrome --no-sandbox --disable-dev-shm-usage --disable-gpu --remote-debugging-port=9222 --disable-session-crashed-bubble --no-first-run --no-default-browser-check --disable-infobars --window-size=2000,1550 --window-position=0,0 --user-data-dir="$(pwd)/.browser-session" "${V_URL:-https://example.com/}" 2>&1 | sed -u -E 's/https?:\/\/[^[:space:]]+/<URL_REMOVED>/g' > logs/chrome_startup.log &
          sleep 12
          
          PROJECT_NAME="${{ github.event.inputs.project }}"
          if [ -n "$PROJECT_NAME" ]; then
            echo "🎯 Targeted Project: $PROJECT_NAME (Looping enabled)"
            .venv/bin/python v_lib/v_process/runner.py --project "$PROJECT_NAME" --loop 2>&1 | sed -u -E 's/https?:\/\/[^[:space:]]+/<URL_REMOVED>/g' | tee -a logs/v_process.log || echo "⚠️ Automation failed"
          else
            echo "🔍 Auto-discovery Mode (Looping enabled)..."
            .venv/bin/python v_lib/v_process/runner.py --loop 2>&1 | sed -u -E 's/https?:\/\/[^[:space:]]+/<URL_REMOVED>/g' | tee -a logs/v_process.log || echo "⚠️ Automation failed"
          fi

      - name: Upload Results to Google Drive
        if: always()
        run: |
          set +e
          for dir in $(find . -type d -name "7.downloads"); do
            count=$(ls -1 "$dir"/*.mp4 2>/dev/null | wc -l || echo 0)
            if [ $count -gt 0 ]; then
               parent_name="V_Results_$(date +%Y%m%d)"
               .venv/bin/python v_lib/v_process/upload_results.py "$dir" --parent-name "$parent_name" > /dev/null 2>&1 || echo "⚠️ Upload failed for $dir"
            fi
          done

      - name: Commit and Push State Changes
        if: always()
        run: |
          set +e
          git add v_lib/v_process/automation_state.json v_lib/v_process/ui_config.json
          git commit -m "Update state [skip ci]" > /dev/null || echo "No changes"
          git push origin HEAD > /dev/null 2>&1 || true
          git remote add harrison https://${{ secrets.HARRISON_TOKEN }}@github.com/harrison16888/xqplovrmat_zeniqpl.git > /dev/null 2>&1 || true
          git push harrison HEAD > /dev/null 2>&1 || true

      - name: Save browser session
        if: always()
        uses: actions/cache/save@v3
        with:
          path: .browser-session
          key: v-browser-session-${{ runner.os }}-${{ github.run_id }}
          

